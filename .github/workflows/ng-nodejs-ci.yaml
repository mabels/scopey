# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Build - @adviser/scopey

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - uses: pnpm/action-setup@v2
        name: Install pnpm
        with:
          run_install: false
          version: 10

      - name: Patch Version ${{ env.GITHUB_REF }}
        run: |
          cd ts ; node ../.github/workflows/patch-package.json.js "origin/head/0.0.0-smoke"
          git diff

      - name: Patch Version ${{ env.GITHUB_REF }}
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd ts ; node ../.github/workflows/patch-package.json.js "$GITHUB_REF"
          git diff

      - name: Build JS @adviser/scopey
        run: |
          cd ts
          pnpm install
          pnpm run format --check
          pnpm run lint
          pnpm run build
          pnpm run test
          pnpm run smoke

  publish:
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/docs'))
    permissions:
      contents: read
      id-token: write
      pages: write

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: 'ts/pnpm-lock.yaml'
          registry-url: 'https://registry.npmjs.org'

      - name: preview 
        run: |
          cd ts
          pnpm install
          pnpm run build
          pnpm run presmoke
          pnpm add -D zx cmd-ts

      #- name: pkg-pr-new preview
      #  run: cd ts/dist/pubdir && npx pkg-pr-new publish

      - name: Publish cement NPM
        run: |
          cd ts/dist/pubdir
          npm install -g npm@11
          npm --version
          npx cement publishTags
          node -e 'console.log(JSON.stringify(process.env, null, 2))'
          npm publish --access public --no-git-checks $(npx cement publishTags)

      - name: Publish cement JSR
        run: |
          cd ts/dist/pubdir
          pnpm run deno:publish
